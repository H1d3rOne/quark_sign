name: Keep Repository Active

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  keep-active:
    runs-on: ubuntu-latest
    steps:
      - name: Create and close issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const today = new Date().toISOString().split('T')[0];
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Auto] Keep repository active - ${today}`,
              body: 'This is an automated issue to keep the repository active. It will be closed automatically.'
            });
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.data.number,
              state: 'closed'
            });
            
            console.log(`Created and closed issue #${issue.data.number}`);
